<div class="rating-card">
    <div class="rating-card__media">
        <image src="{PlatformLogo}" alt="Brand logo" />
    </div>

    <div class="rating-card__body">
        <div class="rating-card__score">
            <div class="rating-card__stars" aria-hidden="true">
                {Array.from({ length: 5 }).map((_, i) => (
                <Icon
                    key="{i}"
                    name="star-icon"
                    className="rating-card__star"
                />
                ))}
            </div>
            <span class="rating-card__value">5.0</span>
        </div>

        <div class="rating-card__meta">2K+ reviews</div>
    </div>
</div>
